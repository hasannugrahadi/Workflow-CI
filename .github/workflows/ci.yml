name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: mlflow-env
          auto-update-conda: true
          python-version: "3.13"

      - name: Install MLflow
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip
          python -m pip install mlflow==2.19.0

      - name: Check Environment
        shell: bash -l {0}
        run: |
          which python
          python --version
          python -m pip show mlflow
          python -m mlflow --version
          conda info --envs

      - name: Run MLflow Project
        shell: bash -l {0}
        run: |
            mlflow run MLproject/

      - name: Save MLflow artifacts
        shell: bash -l {0}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git lfs install
          git lfs track "mlruns/**"

          git add .gitattributes
          git commit -m "Configure Git LFS" || true

          git add -f mlruns/
          git commit -m "Save mlruns from CI run" || true

          git push origin main
